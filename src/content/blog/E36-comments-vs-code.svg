<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" font-family="Georgia, 'Times New Roman', serif">
  <rect width="880" height="470" fill="#f4efe4"/>
  <text x="48" y="56" font-size="28" font-weight="bold" fill="#1c1917">The decisions were all there. As comments.</text>
  <text x="48" y="86" font-size="15" fill="#57534e" font-style="italic">Six flawless explanations, one empty file &#8212; the machine reads code and skips the //.</text>

  <!-- BEFORE panel -->
  <rect x="48" y="112" width="380" height="300" rx="6" fill="#efe7d6" stroke="#d6cbb2"/>
  <text x="68" y="140" font-size="12.5" font-weight="bold" letter-spacing="1" fill="#b45309">BEFORE &#8212; THE COMPUTER IGNORES THESE</text>
  <g font-family="'Courier New', monospace" font-size="14" fill="#a8a29e">
    <text x="68" y="178">// model      &#8594; claude-haiku-4-5</text>
    <text x="68" y="204">// max_tokens &#8594; 1024</text>
    <text x="68" y="230">// system     &#8594; "no-fluff editor,</text>
    <text x="68" y="252">//              keep my voice"</text>
    <text x="68" y="278">// messages   &#8594; the session text</text>
  </g>
  <text x="68" y="338" font-size="13" fill="#78716c" font-style="italic">Perfect notes.</text>
  <text x="68" y="360" font-size="13" fill="#78716c" font-style="italic">Nothing ran.</text>

  <!-- AFTER panel -->
  <rect x="452" y="112" width="380" height="300" rx="6" fill="#1c2530" stroke="#0f172a"/>
  <text x="472" y="140" font-size="12.5" font-weight="bold" letter-spacing="1" fill="#4ade80">AFTER &#8212; NOW IT RUNS</text>
  <g font-family="'Courier New', monospace" font-size="14" fill="#e2e8f0">
    <text x="472" y="178">await client.messages.create({</text>
    <text x="492" y="204">model: "claude-haiku-4-5",</text>
    <text x="492" y="230">max_tokens: 1024,</text>
    <text x="492" y="256">system: "no-fluff editor...",</text>
    <text x="492" y="282">messages: [{ role: "user",</text>
    <text x="512" y="304">content: sessionText }],</text>
    <text x="472" y="330">});</text>
  </g>
  <text x="472" y="376" font-size="13" fill="#4ade80" font-style="italic">It ran. A draft + 3 titles came back.</text>

  <text x="48" y="452" font-size="14" fill="#44403c">E36 &#183; first live Claude API call &#8212; the gun was loaded yesterday; today I built the trigger.</text>
</svg>
