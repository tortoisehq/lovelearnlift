<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Lexend, system-ui, sans-serif">
  <rect width="1200" height="630" fill="#FAFAFB"/>
  <rect x="0" y="0" width="1200" height="10" fill="#22C55E"/>
  <text x="80" y="110" font-size="46" font-weight="800" fill="#151A22" letter-spacing="-1">Calories are scary. Points aren&#39;t.</text>
  <text x="80" y="156" font-size="24" font-weight="500" fill="#5B6472">1 Fuel Point = 10 calories. Your day is 220. Spend them across your ABCs.</text>

  <!-- ring -->
  <g transform="translate(300,400)">
    <circle r="140" fill="none" stroke="#E9ECF1" stroke-width="26" stroke-linecap="round"
            stroke-dasharray="660 880" transform="rotate(135)"/>
    <circle r="140" fill="none" stroke="#22C55E" stroke-width="26" stroke-linecap="round"
            stroke-dasharray="270 880" transform="rotate(135)"/>
    <text x="0" y="-8" font-size="76" font-weight="800" fill="#22C55E" text-anchor="middle" letter-spacing="-2">89</text>
    <text x="0" y="34" font-size="24" font-weight="700" fill="#5B6472" text-anchor="middle">points left</text>
  </g>

  <!-- ABCs -->
  <g transform="translate(620,300)">
    <text x="0" y="0" font-size="28" font-weight="800" fill="#151A22">Follow your ABCs</text>
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="64" height="64" rx="18" fill="#22C55E"/><text x="32" y="44" font-size="34" font-weight="800" fill="#fff" text-anchor="middle">A</text>
      <rect x="84" y="0" width="64" height="64" rx="18" fill="#F59E0B"/><text x="116" y="44" font-size="34" font-weight="800" fill="#fff" text-anchor="middle">B</text>
      <rect x="168" y="0" width="64" height="64" rx="18" fill="#6366F1"/><text x="200" y="44" font-size="34" font-weight="800" fill="#fff" text-anchor="middle">C</text>
      <rect x="252" y="0" width="64" height="64" rx="18" fill="#EC4899"/><text x="284" y="44" font-size="34" font-weight="800" fill="#fff" text-anchor="middle">S</text>
    </g>
    <text x="0" y="150" font-size="23" font-weight="500" fill="#5B6472">Three meals and a snack. Talk once —</text>
    <text x="0" y="182" font-size="23" font-weight="500" fill="#5B6472">the AI splits it, files it, spends the points.</text>
  </g>
</svg>
