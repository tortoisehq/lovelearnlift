<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="A spoken voice on the left sends threads across to a quilt of denim patches on the right; two patches are labelled journal and fuel, a bright thread stitching each piece into its place.">
  <rect width="640" height="360" fill="#FAFAFB"/>

  <!-- the voice: concentric arcs leaving a phone dot -->
  <g stroke="#2E7CF6" fill="none" stroke-width="3" stroke-linecap="round">
    <circle cx="72" cy="180" r="10" fill="#2E7CF6" stroke="none"/>
    <path d="M92 160 A28 28 0 0 1 92 200"/>
    <path d="M104 148 A44 44 0 0 1 104 212"/>
    <path d="M116 136 A60 60 0 0 1 116 224"/>
  </g>

  <!-- threads routing across to the quilt -->
  <g stroke="#22C55E" fill="none" stroke-width="2.5" stroke-dasharray="6 7" stroke-linecap="round">
    <path d="M126 172 C 240 120, 300 118, 372 120"/>
    <path d="M128 188 C 240 210, 300 214, 372 206"/>
    <path d="M126 180 C 250 300, 320 296, 372 292"/>
  </g>

  <!-- the quilt: a grid of stitched denim patches -->
  <g>
    <rect x="372" y="60"  width="70" height="70" rx="8" fill="#3d5a86"/>
    <rect x="450" y="60"  width="70" height="70" rx="8" fill="#54749f"/>
    <rect x="528" y="60"  width="70" height="70" rx="8" fill="#22385a"/>
    <rect x="372" y="138" width="70" height="70" rx="8" fill="#2c476f"/>
    <rect x="450" y="138" width="70" height="70" rx="8" fill="#22385a"/>
    <rect x="528" y="138" width="70" height="70" rx="8" fill="#3d5a86"/>
    <rect x="372" y="216" width="70" height="70" rx="8" fill="#22385a"/>
    <rect x="450" y="216" width="70" height="70" rx="8" fill="#2c476f"/>
    <rect x="528" y="216" width="70" height="70" rx="8" fill="#54749f"/>
  </g>

  <!-- the two patches the threads land on, brightened + labelled -->
  <g>
    <rect x="372" y="138" width="70" height="70" rx="8" fill="none" stroke="#22C55E" stroke-width="3"/>
    <rect x="372" y="216" width="70" height="70" rx="8" fill="none" stroke="#22C55E" stroke-width="3"/>
    <rect x="372" y="60"  width="70" height="70" rx="8" fill="none" stroke="#2E7CF6" stroke-width="3"/>
  </g>

  <!-- stitch dashes over the seams -->
  <g stroke="#FAFAFB" stroke-width="2" stroke-dasharray="5 6" opacity="0.7">
    <line x1="372" y1="134" x2="598" y2="134"/>
    <line x1="372" y1="212" x2="598" y2="212"/>
    <line x1="446" y1="60" x2="446" y2="286"/>
    <line x1="524" y1="60" x2="524" y2="286"/>
  </g>

  <text x="407" y="102" font-family="Lexend, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAFAFB" text-anchor="middle">note</text>
  <text x="407" y="180" font-family="Lexend, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAFAFB" text-anchor="middle">journal</text>
  <text x="407" y="258" font-family="Lexend, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAFAFB" text-anchor="middle">fuel</text>

  <text x="72" y="250" font-family="Lexend, system-ui, sans-serif" font-size="15" font-weight="700" fill="#151A22" text-anchor="middle">a voice</text>
</svg>
