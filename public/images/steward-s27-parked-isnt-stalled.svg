<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A rail signal held at stop beside three green check marks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2330"/>
      <stop offset="1" stop-color="#151A22"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff5a52" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff5a52" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ground line -->
  <rect x="0" y="486" width="1200" height="3" fill="#2b3644"/>
  <rect x="0" y="500" width="1200" height="2" fill="#222c39"/>

  <!-- rail signal mast (left) -->
  <g transform="translate(300 130)">
    <rect x="-9" y="0" width="18" height="356" rx="4" fill="#2b3644"/>
    <rect x="-70" y="352" width="140" height="12" rx="4" fill="#2b3644"/>
    <!-- signal head -->
    <rect x="-58" y="4" width="116" height="196" rx="26" fill="#0f151d" stroke="#33404f" stroke-width="3"/>
    <!-- red lamp lit (HOLD) -->
    <circle cx="0" cy="60" r="70" fill="url(#lampGlow)"/>
    <circle cx="0" cy="60" r="34" fill="#ff5a52" stroke="#ffb3af" stroke-width="2"/>
    <!-- amber lamp dim -->
    <circle cx="0" cy="146" r="34" fill="#3a3320" stroke="#4a4026" stroke-width="2"/>
  </g>

  <!-- three "caught" checks (right) -->
  <g transform="translate(720 150)" font-family="Lexend, Segoe UI, system-ui, sans-serif">
    <g transform="translate(0 0)">
      <circle cx="34" cy="34" r="34" fill="#22C55E"/>
      <path d="M18 35 l11 11 l20 -23" fill="none" stroke="#0d1117" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="44" fill="#e7edf5" font-size="30" font-weight="600">Migration the save path needed</text>
    </g>
    <g transform="translate(0 92)">
      <circle cx="34" cy="34" r="34" fill="#22C55E"/>
      <path d="M18 35 l11 11 l20 -23" fill="none" stroke="#0d1117" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="44" fill="#e7edf5" font-size="30" font-weight="600">A wrong citation, blocked</text>
    </g>
    <g transform="translate(0 184)">
      <circle cx="34" cy="34" r="34" fill="#22C55E"/>
      <path d="M18 35 l11 11 l20 -23" fill="none" stroke="#0d1117" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="44" fill="#e7edf5" font-size="30" font-weight="600">A lost-phone lock hole</text>
    </g>
  </g>

  <!-- title strip -->
  <text x="80" y="560" font-family="Lexend, Segoe UI, system-ui, sans-serif" font-size="40" font-weight="700" fill="#FAFAFB">Parked isn&#39;t stalled.</text>
  <text x="80" y="600" font-family="Lexend, Segoe UI, system-ui, sans-serif" font-size="24" font-weight="500" fill="#2E7CF6">The gate doing its job.</text>
</svg>
