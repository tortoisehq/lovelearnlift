<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img" aria-label="An honest calorie estimate shown as a range, 390 to 530 kilocalories, not a single fake-precise number.">
  <defs>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2E7CF6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="640" height="300" rx="24" fill="#FAFAFB"/>
  <rect x="0.5" y="0.5" width="639" height="299" rx="23.5" fill="none" stroke="#E4E8EE"/>
  <text x="40" y="66" font-family="Lexend, system-ui, sans-serif" font-size="13" letter-spacing="2" fill="#98A0AD">TODAY · LUNCH</text>
  <!-- the crossed-out fake-precise number -->
  <text x="40" y="120" font-family="Lexend, system-ui, sans-serif" font-size="34" font-weight="800" fill="#98A0AD">452 kcal</text>
  <line x1="40" y1="110" x2="212" y2="110" stroke="#98A0AD" stroke-width="3"/>
  <!-- the honest range -->
  <text x="40" y="182" font-family="Lexend, system-ui, sans-serif" font-size="40" font-weight="800" fill="#151A22">~460</text>
  <text x="185" y="182" font-family="Lexend, system-ui, sans-serif" font-size="22" font-weight="600" fill="#525A66">390–530 kcal</text>
  <!-- the range bar -->
  <rect x="40" y="214" width="560" height="18" rx="9" fill="#EEF1F5"/>
  <rect x="230" y="214" width="230" height="18" rx="9" fill="url(#band)"/>
  <rect x="230" y="214" width="230" height="18" rx="9" fill="none" stroke="#2E7CF6" stroke-opacity="0.5"/>
  <!-- confidence pips -->
  <g fill="#2E7CF6">
    <rect x="40" y="256" width="12" height="12" rx="4"/>
    <rect x="58" y="256" width="12" height="12" rx="4"/>
    <rect x="76" y="256" width="12" height="12" rx="4"/>
  </g>
  <rect x="94" y="256" width="12" height="12" rx="4" fill="#EEF1F5"/>
  <rect x="112" y="256" width="12" height="12" rx="4" fill="#EEF1F5"/>
  <text x="140" y="266" font-family="Lexend, system-ui, sans-serif" font-size="14" fill="#525A66">honest about what it doesn’t know</text>
</svg>
