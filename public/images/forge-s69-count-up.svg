<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" role="img" aria-label="A calorie tracker that counts up instead of down: protein shown as a range on a bar with a target band, and progress shown as a quilt of patches that grows a patch for every day you show up.">
  <defs>
    <linearGradient id="fill69" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0E9E6E"/>
      <stop offset="1" stop-color="#22B985"/>
    </linearGradient>
  </defs>
  <!-- warm linen card -->
  <rect width="640" height="320" rx="24" fill="#F4EFE6"/>
  <rect x="0.5" y="0.5" width="639" height="319" rx="23.5" fill="none" stroke="#E7E0D2"/>

  <!-- protein hero: a range, counting UP, on a bar with a target band + tick (never a ring) -->
  <text x="40" y="58" font-family="Lexend, system-ui, sans-serif" font-size="13" letter-spacing="2" fill="#8C8578">PROTEIN · TODAY · COUNTING UP</text>
  <text x="40" y="112" font-family="Lexend, system-ui, sans-serif" font-size="44" font-weight="800" fill="#211D17">84–96</text>
  <text x="205" y="112" font-family="Lexend, system-ui, sans-serif" font-size="22" font-weight="600" fill="#8C8578">g · target 120–150</text>

  <!-- the bar: track, mint target band, mint fill, tick — no countdown, no red -->
  <rect x="40" y="132" width="560" height="18" rx="9" fill="#EFE9DD"/>
  <rect x="400" y="132" width="112" height="18" fill="#DDF1E7"/>
  <line x1="400" y1="130" x2="400" y2="152" stroke="#8FD9BE" stroke-width="1.5" stroke-dasharray="2 2"/>
  <line x1="512" y1="130" x2="512" y2="152" stroke="#8FD9BE" stroke-width="1.5" stroke-dasharray="2 2"/>
  <rect x="40" y="132" width="360" height="18" rx="9" fill="url(#fill69)" opacity="0.4"/>
  <rect x="40" y="132" width="315" height="18" rx="9" fill="url(#fill69)"/>
  <rect x="511" y="130" width="2" height="22" rx="1" fill="#211D17" opacity="0.55"/>

  <!-- the quilt: a patch for every day you show up -->
  <text x="40" y="212" font-family="Lexend, system-ui, sans-serif" font-size="13" letter-spacing="2" fill="#8C8578">YOUR QUILT · 23 DAYS STITCHED</text>
  <g>
    <!-- row of patches: filled (denim/mint), today (mint, ringed), a few still empty (hairline) -->
    <rect x="40"  y="228" width="34" height="34" rx="6" fill="#33517F"/>
    <rect x="82"  y="228" width="34" height="34" rx="6" fill="#0E9E6E"/>
    <rect x="124" y="228" width="34" height="34" rx="6" fill="#33517F"/>
    <rect x="166" y="228" width="34" height="34" rx="6" fill="#33517F"/>
    <rect x="208" y="228" width="34" height="34" rx="6" fill="#0E9E6E"/>
    <rect x="250" y="228" width="34" height="34" rx="6" fill="#33517F"/>
    <rect x="292" y="228" width="34" height="34" rx="6" fill="#0E9E6E"/>
    <rect x="334" y="228" width="34" height="34" rx="6" fill="#33517F"/>
    <rect x="376" y="228" width="34" height="34" rx="6" fill="#33517F"/>
    <!-- today's patch, just stitched -->
    <rect x="418" y="228" width="34" height="34" rx="6" fill="#0E9E6E"/>
    <rect x="415.5" y="225.5" width="39" height="39" rx="8" fill="none" stroke="#0E9E6E" stroke-width="2" opacity="0.5"/>
    <!-- days not yet lived — a gap just waits, never a broken streak -->
    <rect x="460" y="228" width="34" height="34" rx="6" fill="none" stroke="#E7E0D2" stroke-width="2"/>
    <rect x="502" y="228" width="34" height="34" rx="6" fill="none" stroke="#E7E0D2" stroke-width="2"/>
    <rect x="544" y="228" width="34" height="34" rx="6" fill="none" stroke="#E7E0D2" stroke-width="2"/>
  </g>
  <text x="40" y="296" font-family="Lexend, system-ui, sans-serif" font-size="14" fill="#8C8578">a patch for every day you show up — you can’t fail a quilt</text>
</svg>
